name: Недельный AI-дайджест

# Реальная автоматизация: раз в неделю (и по кнопке) собирает коммиты за неделю,
# AI (DeepSeek) делает дайджест изменений, кладёт как артефакт и — если заданы
# секреты Telegram — публикует в канал. Без секретов шаг публикации мягко
# пропускается (пайплайн не падает).
#
# Секреты репозитория: DEEPSEEK_API_KEY (обяз.),
#   TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID (опц. — для публикации).

on:
  schedule:
    - cron: "0 9 * * 1"        # каждый понедельник 09:00 UTC
  workflow_dispatch: {}         # и вручную из вкладки Actions

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # нужна история для git log

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Установка зависимостей
        working-directory: "week 7/day 5"
        run: pip install -r requirements.txt

      - name: Сгенерировать и опубликовать дайджест
        working-directory: "week 7/day 5"
        env:
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py --since "7 days ago" --title "Дайджест за неделю" --out digest.md --notify

      - name: Артефакт с дайджестом
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest
          path: "week 7/day 5/digest.md"
