<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    h1 { font-size: 1.6rem; font-weight: 700; color: #a78bfa; letter-spacing: .02em; }

    #turn-badge {
      font-size: .8rem;
      color: #555f80;
      background: #1a1d2e;
      border: 1px solid #2e3050;
      border-radius: 20px;
      padding: .25rem .75rem;
    }

    #clear-btn {
      background: transparent;
      border: 1px solid #3b2f6e;
      color: #a78bfa;
      border-radius: 8px;
      padding: .35rem .9rem;
      font-size: .85rem;
      cursor: pointer;
      transition: background .2s;
    }
    #clear-btn:hover { background: #1e1535; }

    #chat {
      width: 100%;
      max-width: 720px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      min-height: 200px;
    }

    .bubble {
      padding: .75rem 1rem;
      border-radius: 12px;
      line-height: 1.6;
      max-width: 90%;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: .95rem;
    }

    .bubble.user {
      background: #1e1f2e;
      border: 1px solid #2e3050;
      align-self: flex-end;
      color: #c4c9ff;
    }

    .bubble.agent {
      background: #161b27;
      border: 1px solid #283048;
      align-self: flex-start;
    }

    .bubble.agent .meta {
      margin-top: .5rem;
      font-size: .75rem;
      color: #555f80;
    }

    .bubble.error {
      background: #2a1010;
      border: 1px solid #5a2020;
      color: #ff7070;
      align-self: flex-start;
    }

    .bubble.thinking {
      background: #161b27;
      border: 1px solid #283048;
      align-self: flex-start;
      color: #555f80;
      font-style: italic;
    }

    .divider {
      text-align: center;
      font-size: .75rem;
      color: #3b4060;
      margin: .25rem 0;
    }

    .input-row {
      display: flex;
      gap: .5rem;
      margin-top: .5rem;
    }

    textarea {
      flex: 1;
      resize: none;
      background: #1a1d2e;
      border: 1px solid #2e3050;
      border-radius: 10px;
      color: #e8eaf0;
      padding: .7rem 1rem;
      font-size: .95rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    textarea:focus { border-color: #7c5cfa; }

    button#send-btn {
      background: #7c5cfa;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .7rem 1.4rem;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    button#send-btn:hover:not(:disabled) { background: #6246ea; }
    button#send-btn:disabled { opacity: .45; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>🤖 LLM Agent</h1>
    <div style="display:flex;gap:.75rem;align-items:center">
      <span id="turn-badge">Ход 0</span>
      <button id="clear-btn" onclick="clearHistory()">🗑 Очистить</button>
    </div>
  </header>

  <div id="chat">
    <div class="messages" id="messages"></div>

    <div class="input-row">
      <textarea
        id="input"
        rows="3"
        placeholder="Введите запрос… Enter — отправить, Shift+Enter — перенос строки"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">Отправить</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("input");
    const sendBtn    = document.getElementById("send-btn");
    const turnBadge  = document.getElementById("turn-badge");

    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function setLoading(on) {
      inputEl.disabled = on;
      sendBtn.disabled = on;
    }

    function addBubble(text, cls, meta) {
      const div = document.createElement("div");
      div.className = `bubble ${cls}`;
      div.textContent = text;
      if (meta) {
        const m = document.createElement("div");
        m.className = "meta";
        m.textContent = meta;
        div.appendChild(m);
      }
      messagesEl.appendChild(div);
      div.scrollIntoView({ behavior: "smooth", block: "end" });
      return div;
    }

    function addDivider(text) {
      const d = document.createElement("div");
      d.className = "divider";
      d.textContent = `— ${text} —`;
      messagesEl.appendChild(d);
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      setLoading(true);

      addBubble(text, "user");
      const thinking = addBubble("Агент думает…", "thinking");

      try {
        const res  = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        thinking.remove();

        if (!res.ok) {
          addBubble(data.error || "Неизвестная ошибка", "error");
        } else {
          const meta = `Ход ${data.turn} · Модель: ${data.model} · `
                     + `Токены: ${data.prompt_tokens} → ${data.completion_tokens} · `
                     + `Время: ${data.elapsed_sec} с`;
          addBubble(data.answer, "agent", meta);
          turnBadge.textContent = `Ход ${data.turn}`;
        }
      } catch (err) {
        thinking.remove();
        addBubble("Сетевая ошибка: " + err.message, "error");
      } finally {
        setLoading(false);
        inputEl.focus();
      }
    }

    async function clearHistory() {
      await fetch("/clear", { method: "POST" });
      messagesEl.innerHTML = "";
      turnBadge.textContent = "Ход 0";
      addDivider("история очищена");
      inputEl.focus();
    }
  </script>
</body>
</html>
