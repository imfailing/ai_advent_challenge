<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Agent</title>
  <!-- Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <!-- Syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/sql.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    h1 { font-size: 1.6rem; font-weight: 700; color: #a78bfa; letter-spacing: .02em; }

    #turn-badge {
      font-size: .8rem;
      color: #555f80;
      background: #1a1d2e;
      border: 1px solid #2e3050;
      border-radius: 20px;
      padding: .25rem .75rem;
    }

    #clear-btn {
      background: transparent;
      border: 1px solid #3b2f6e;
      color: #a78bfa;
      border-radius: 8px;
      padding: .35rem .9rem;
      font-size: .85rem;
      cursor: pointer;
      transition: background .2s;
    }
    #clear-btn:hover { background: #1e1535; }

    #chat {
      width: 100%;
      max-width: 720px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      min-height: 200px;
    }

    .bubble {
      padding: .75rem 1rem;
      border-radius: 12px;
      line-height: 1.6;
      max-width: 90%;
      word-break: break-word;
      font-size: .95rem;
    }

    /* ---------- Markdown styles inside agent bubbles ---------- */
    .bubble.agent .md p        { margin: .4rem 0; }
    .bubble.agent .md p:first-child { margin-top: 0; }
    .bubble.agent .md p:last-child  { margin-bottom: 0; }
    .bubble.agent .md h1,
    .bubble.agent .md h2,
    .bubble.agent .md h3       { margin: .8rem 0 .3rem; font-weight: 700; color: #c4c9ff; }
    .bubble.agent .md ul,
    .bubble.agent .md ol       { padding-left: 1.4rem; margin: .4rem 0; }
    .bubble.agent .md li       { margin: .2rem 0; }
    .bubble.agent .md strong   { color: #d4d8ff; font-weight: 700; }
    .bubble.agent .md em       { color: #b0b8e0; }
    .bubble.agent .md a        { color: #a78bfa; }
    .bubble.agent .md blockquote {
      border-left: 3px solid #3b4060;
      margin: .5rem 0;
      padding: .3rem .8rem;
      color: #8890b0;
    }
    .bubble.agent .md code {   /* inline code */
      background: #1e2235;
      border: 1px solid #2e3454;
      border-radius: 4px;
      padding: .1em .4em;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: .88em;
      color: #c4c9ff;
    }
    .bubble.agent .md pre {    /* code block */
      background: #111520 !important;
      border: 1px solid #222840;
      border-radius: 8px;
      padding: .9rem 1rem;
      overflow-x: auto;
      margin: .6rem 0;
      position: relative;
    }
    .bubble.agent .md pre code { /* reset inline style inside block */
      background: transparent;
      border: none;
      padding: 0;
      font-size: .87em;
      line-height: 1.6;
    }
    .bubble.agent .md hr {
      border: none;
      border-top: 1px solid #2e3050;
      margin: .8rem 0;
    }
    .bubble.agent .md table {
      border-collapse: collapse;
      width: 100%;
      margin: .6rem 0;
      font-size: .9em;
    }
    .bubble.agent .md th,
    .bubble.agent .md td {
      border: 1px solid #2e3050;
      padding: .4rem .7rem;
      text-align: left;
    }
    .bubble.agent .md th { background: #1a1d2e; color: #a78bfa; }

    /* user bubble stays plain text */
    .bubble.user { white-space: pre-wrap; }

    .bubble.user {
      background: #1e1f2e;
      border: 1px solid #2e3050;
      align-self: flex-end;
      color: #c4c9ff;
    }

    .bubble.agent {
      background: #161b27;
      border: 1px solid #283048;
      align-self: flex-start;
    }

    .bubble.agent .meta {
      margin-top: .5rem;
      font-size: .75rem;
      color: #555f80;
    }

    .bubble.error {
      background: #2a1010;
      border: 1px solid #5a2020;
      color: #ff7070;
      align-self: flex-start;
    }

    .bubble.thinking {
      background: #161b27;
      border: 1px solid #283048;
      align-self: flex-start;
      color: #555f80;
      font-style: italic;
    }

    .divider {
      text-align: center;
      font-size: .75rem;
      color: #3b4060;
      margin: .25rem 0;
    }

    .input-row {
      display: flex;
      gap: .5rem;
      margin-top: .5rem;
    }

    textarea {
      flex: 1;
      resize: none;
      background: #1a1d2e;
      border: 1px solid #2e3050;
      border-radius: 10px;
      color: #e8eaf0;
      padding: .7rem 1rem;
      font-size: .95rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    textarea:focus { border-color: #7c5cfa; }

    button#send-btn {
      background: #7c5cfa;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .7rem 1.4rem;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    button#send-btn:hover:not(:disabled) { background: #6246ea; }
    button#send-btn:disabled { opacity: .45; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>🤖 LLM Agent</h1>
    <div style="display:flex;gap:.75rem;align-items:center">
      <span id="turn-badge">Ход 0</span>
      <button id="clear-btn" onclick="clearHistory()">🗑 Очистить</button>
    </div>
  </header>

  <div id="chat">
    <div class="messages" id="messages"></div>

    <div class="input-row">
      <textarea
        id="input"
        rows="3"
        placeholder="Введите запрос… Enter — отправить, Shift+Enter — перенос строки"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">Отправить</button>
    </div>
  </div>

  <script>
    // Configure marked: use highlight.js for code blocks
    marked.use({
      gfm: true,
      breaks: true,
      highlight(code, lang) {
        const language = hljs.getLanguage(lang) ? lang : "plaintext";
        return hljs.highlight(code, { language }).value;
      },
    });

    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("input");
    const sendBtn    = document.getElementById("send-btn");
    const turnBadge  = document.getElementById("turn-badge");

    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function setLoading(on) {
      inputEl.disabled = on;
      sendBtn.disabled = on;
    }

    function addBubble(text, cls, meta, renderMarkdown = false) {
      const div = document.createElement("div");
      div.className = `bubble ${cls}`;

      if (renderMarkdown) {
        // Render markdown into a wrapper so CSS selectors stay scoped
        const md = document.createElement("div");
        md.className = "md";
        md.innerHTML = marked.parse(text);
        div.appendChild(md);
      } else {
        div.textContent = text;
      }

      if (meta) {
        const m = document.createElement("div");
        m.className = "meta";
        m.textContent = meta;
        div.appendChild(m);
      }

      messagesEl.appendChild(div);
      div.scrollIntoView({ behavior: "smooth", block: "end" });
      return div;
    }

    function addDivider(text) {
      const d = document.createElement("div");
      d.className = "divider";
      d.textContent = `— ${text} —`;
      messagesEl.appendChild(d);
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      setLoading(true);

      addBubble(text, "user");
      const thinking = addBubble("Агент думает…", "thinking");

      try {
        const res  = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        thinking.remove();

        if (!res.ok) {
          addBubble(data.error || "Неизвестная ошибка", "error");
        } else {
          const meta = `Ход ${data.turn} · Модель: ${data.model} · `
                     + `Токены: ${data.prompt_tokens} → ${data.completion_tokens} · `
                     + `Время: ${data.elapsed_sec} с`;
          addBubble(data.answer, "agent", meta, true);
          turnBadge.textContent = `Ход ${data.turn}`;
        }
      } catch (err) {
        thinking.remove();
        addBubble("Сетевая ошибка: " + err.message, "error");
      } finally {
        setLoading(false);
        inputEl.focus();
      }
    }

    async function clearHistory() {
      await fetch("/clear", { method: "POST" });
      messagesEl.innerHTML = "";
      turnBadge.textContent = "Ход 0";
      addDivider("история очищена");
      inputEl.focus();
    }
  </script>
</body>
</html>
