# Reverse-proxy для приватного AI-сервиса на VPS.
# Терминирует TLS и проксирует на API-сервис (порт 5008).
# Стриминг NDJSON: отключаем буферизацию, чтобы токены шли клиенту сразу.

server {
    listen 80;
    server_name your-domain.example;      # заменить на свой домен

    # (после certbot тут появится 443/TLS; HTTP редиректить на HTTPS)

    # базовый лимит соединений/скорости на уровне nginx (доп. к rate limit сервиса)
    client_max_body_size 1m;

    location / {
        proxy_pass         http://127.0.0.1:5008;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # стриминг: не буферизовать ответ
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }
}

# TLS (после `certbot --nginx -d your-domain.example`):
#   Let's Encrypt автоматически добавит server{listen 443 ssl; ...} и редирект.
