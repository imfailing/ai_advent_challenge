# Приватный AI-сервис для VPS: Ollama (сервит модель) + наш API-сервис.
# Модель сервим сами на VPS — контейнер ollama держит веса и инференс.

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama       # веса моделей переживают перезапуск
    # порт наружу НЕ пробрасываем — Ollama доступен только сервису во внутренней сети
    # (если нужен GPU на VPS — добавить deploy.resources / --gpus, см. README)

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      OLLAMA_URL: "http://ollama:11434"   # ходим к ollama по имени сервиса
      MODEL: "${MODEL:-qwen2.5:1.5b}"
      API_KEYS: "${API_KEYS:-}"           # ключи через запятую (пусто = без auth, не для прода!)
      RATE_LIMIT: "${RATE_LIMIT:-30}"
      RATE_WINDOW: "${RATE_WINDOW:-60}"
      MAX_INPUT_CHARS: "${MAX_INPUT_CHARS:-8000}"
      NUM_CTX: "${NUM_CTX:-4096}"
    ports:
      - "5008:5008"                       # наружу — только API-сервис

volumes:
  ollama_models:
