<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ассистент разработчика</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;gap:1rem}
    header{width:100%;max-width:860px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
    h1{font-size:1.4rem;font-weight:700;color:#fbbf24}
    .badges{display:flex;gap:.5rem;flex-wrap:wrap}
    .badge{font-size:.74rem;color:#7080a0;background:#1a1d2e;border:1px solid #2e3050;border-radius:20px;padding:.2rem .6rem}
    #chat{width:100%;max-width:860px;display:flex;flex-direction:column;gap:1rem}
    .messages{display:flex;flex-direction:column;gap:.75rem;min-height:240px}
    .bubble{padding:.7rem 1rem;border-radius:12px;line-height:1.6;max-width:94%;word-break:break-word;font-size:.93rem}
    .bubble.user{background:#1e1f2e;border:1px solid #2e3050;align-self:flex-end;color:#c4c9ff;white-space:pre-wrap}
    .bubble.agent{background:#191826;border:1px solid #33304e;align-self:flex-start}
    .bubble.thinking{background:#191826;border:1px solid #33304e;align-self:flex-start;color:#555f80;font-style:italic}
    .bubble.error{background:#2a1010;border:1px solid #5a2020;color:#ff7070;align-self:flex-start}
    .git{margin-top:.55rem;padding:.4rem .6rem;background:#12101f;border:1px solid #2a2540;border-radius:8px;font-size:.74rem;color:#c4b5e0}
    .git .gt{color:#fbbf24;font-weight:600}
    .git code{color:#a5b4fc}
    .sources{margin-top:.5rem;padding-top:.45rem;border-top:1px solid #33304e}
    .sources .st{font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;color:#7d6a4a;margin-bottom:.25rem}
    .src{display:inline-block;font-size:.71rem;color:#e0c98f;background:#211c10;border:1px solid #4a3d10;border-radius:6px;padding:.12rem .5rem;margin:.15rem .25rem .15rem 0}
    .bubble.agent .md p{margin:.4rem 0}.bubble.agent .md p:first-child,.bubble.agent .md p:last-child{margin-top:0;margin-bottom:0}
    .bubble.agent .md ul,.bubble.agent .md ol{padding-left:1.4rem;margin:.35rem 0}.bubble.agent .md strong{color:#fde68a}
    .bubble.agent .md code{background:#211c10;border-radius:4px;padding:.1em .4em;font-size:.86em;color:#fcd34d}
    .bubble.agent .md table{border-collapse:collapse;width:100%;margin:.5rem 0;font-size:.85em}
    .bubble.agent .md th,.bubble.agent .md td{border:1px solid #2e3050;padding:.3rem .6rem}.bubble.agent .md th{background:#211c10;color:#fbbf24}
    .input-row{display:flex;gap:.5rem}
    textarea#input{flex:1;resize:none;background:#1a1d2e;border:1px solid #2e3050;border-radius:10px;color:#e8eaf0;padding:.65rem 1rem;font-size:.93rem;font-family:inherit;outline:none}
    textarea#input:focus{border-color:#fbbf24}
    #send-btn{background:#fbbf24;color:#2a1e04;border:none;border-radius:10px;padding:.65rem 1.3rem;font-size:.93rem;font-weight:700;cursor:pointer}
    #send-btn:hover:not(:disabled){background:#f59e0b}#send-btn:disabled{opacity:.4;cursor:not-allowed}
    .hint{width:100%;max-width:860px;font-size:.74rem;color:#4a5568}
    .hint code{color:#fbbf24}
  </style>
</head>
<body>
<header>
  <h1>🛠 Ассистент разработчика</h1>
  <div class="badges">
    <span class="badge">RAG по докам</span>
    <span class="badge">git через MCP</span>
    <span class="badge">DeepSeek</span>
  </div>
</header>

<div id="chat">
  <div class="messages" id="messages"></div>
  <div class="input-row">
    <textarea id="input" rows="3" placeholder="Спросите о проекте… напр. «/help» или «на какой ветке проект?»"></textarea>
    <button id="send-btn" onclick="send()">Спросить</button>
  </div>
</div>
<div class="hint">Команда <code>/help</code> — что умею. Отвечаю по документации проекта (README + доки дней + claude/) и живому состоянию git.</div>

<script>
marked.use({gfm:true,breaks:true});
const messagesEl=document.getElementById("messages");
const inputEl=document.getElementById("input");
const sendBtn=document.getElementById("send-btn");
inputEl.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
function setLoading(on){inputEl.disabled=on;sendBtn.disabled=on;}
function addUser(t){const d=document.createElement("div");d.className="bubble user";d.textContent=t;messagesEl.appendChild(d);d.scrollIntoView({behavior:"smooth",block:"end"});}
function addError(t){const d=document.createElement("div");d.className="bubble error";d.textContent=t;messagesEl.appendChild(d);d.scrollIntoView({behavior:"smooth",block:"end"});}

function addAgent(data){
  const d=document.createElement("div");d.className="bubble agent";
  const md=document.createElement("div");md.className="md";md.innerHTML=marked.parse(data.answer);d.appendChild(md);
  if(data.git_calls&&data.git_calls.length){
    const g=document.createElement("div");g.className="git";
    let html='<div class="gt">🔧 git через MCP:</div>';
    data.git_calls.forEach(c=>{const r=(c.result||'').split('\n')[0].slice(0,80);html+=`<div><code>${c.tool}(${JSON.stringify(c.args)})</code> → ${r}</div>`;});
    g.innerHTML=html;d.appendChild(g);
  }
  if(data.sources&&data.sources.length){
    const s=document.createElement("div");s.className="sources";
    let html='<div class="st">📎 Источники (документация)</div>';
    const seen=new Set();
    data.sources.forEach(x=>{if(seen.has(x.source))return;seen.add(x.source);html+=`<span class="src">${x.source}</span>`;});
    s.innerHTML=html;d.appendChild(s);
  }
  messagesEl.appendChild(d);d.scrollIntoView({behavior:"smooth",block:"end"});
}

async function send(){
  const text=inputEl.value.trim();if(!text)return;
  inputEl.value="";setLoading(true);addUser(text);
  const th=document.createElement("div");th.className="bubble thinking";th.textContent="Ищу в документации и git…";messagesEl.appendChild(th);th.scrollIntoView({behavior:"smooth",block:"end"});
  try{
    const res=await fetch("/ask",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text})});
    const data=await res.json();th.remove();
    if(!res.ok){addError(data.error||"Ошибка");}else{addAgent(data);}
  }catch(err){th.remove();addError("Сеть: "+err.message);}
  finally{setLoading(false);inputEl.focus();}
}

// приветствие
addAgent({answer:"👋 Привет! Я ассистент этого проекта. Напишите **/help**, чтобы узнать, что я умею, или сразу задайте вопрос — например «на какой ветке проект?».",sources:[],git_calls:[]});
</script>
</body>
</html>
