<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Поддержка CloudNote — AI-ассистент</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;gap:1rem}
    header{width:100%;max-width:860px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
    h1{font-size:1.35rem;font-weight:700;color:#22d3ee}
    .badge{font-size:.74rem;color:#7080a0;background:#1a1d2e;border:1px solid #2e3050;border-radius:20px;padding:.2rem .6rem}
    .ticketbar{width:100%;max-width:860px;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
    .ticketbar label{font-size:.8rem;color:#7080a0}
    select{flex:1;min-width:220px;background:#1a1d2e;border:1px solid #2e3050;border-radius:8px;color:#e8eaf0;padding:.4rem .6rem;font-size:.85rem;outline:none;cursor:pointer}
    select:focus{border-color:#22d3ee}
    #ticket-card{width:100%;max-width:860px;font-size:.8rem;color:#a5c9d6;background:#0e1a1f;border:1px solid #16404a;border-radius:10px;padding:.5rem .8rem;display:none}
    #ticket-card b{color:#67e8f9}
    #chat{width:100%;max-width:860px;display:flex;flex-direction:column;gap:1rem}
    .messages{display:flex;flex-direction:column;gap:.75rem;min-height:200px}
    .bubble{padding:.7rem 1rem;border-radius:12px;line-height:1.6;max-width:94%;word-break:break-word;font-size:.93rem}
    .bubble.user{background:#1e1f2e;border:1px solid #2e3050;align-self:flex-end;color:#c4c9ff;white-space:pre-wrap}
    .bubble.agent{background:#0f1b20;border:1px solid #15414a;align-self:flex-start}
    .bubble.thinking{background:#0f1b20;border:1px solid #15414a;align-self:flex-start;color:#555f80;font-style:italic}
    .bubble.error{background:#2a1010;border:1px solid #5a2020;color:#ff7070;align-self:flex-start}
    .ctx{margin-top:.5rem;font-size:.72rem;color:#6faebf;background:#0c161a;border:1px solid #143038;border-radius:8px;padding:.35rem .6rem}
    .sources{margin-top:.5rem;padding-top:.45rem;border-top:1px solid #15414a}
    .sources .st{font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;color:#4a7d8a;margin-bottom:.25rem}
    .src{display:inline-block;font-size:.71rem;color:#8fdce8;background:#0c1e24;border:1px solid #16404a;border-radius:6px;padding:.12rem .5rem;margin:.15rem .25rem .15rem 0}
    .bubble.agent .md p{margin:.4rem 0}.bubble.agent .md p:first-child,.bubble.agent .md p:last-child{margin-top:0;margin-bottom:0}
    .bubble.agent .md ol,.bubble.agent .md ul{padding-left:1.4rem;margin:.35rem 0}.bubble.agent .md strong{color:#a5f3fc}
    .bubble.agent .md code{background:#0c1e24;border-radius:4px;padding:.1em .4em;font-size:.86em;color:#67e8f9}
    .input-row{display:flex;gap:.5rem}
    textarea#input{flex:1;resize:none;background:#1a1d2e;border:1px solid #2e3050;border-radius:10px;color:#e8eaf0;padding:.65rem 1rem;font-size:.93rem;font-family:inherit;outline:none}
    textarea#input:focus{border-color:#22d3ee}
    #send-btn{background:#22d3ee;color:#04232a;border:none;border-radius:10px;padding:.65rem 1.3rem;font-size:.93rem;font-weight:700;cursor:pointer}
    #send-btn:hover:not(:disabled){background:#06b6d4}#send-btn:disabled{opacity:.4;cursor:not-allowed}
    .hint{width:100%;max-width:860px;font-size:.74rem;color:#4a5568}
  </style>
</head>
<body>
<header>
  <h1>💬 Поддержка CloudNote</h1>
  <span class="badge">RAG по FAQ/докам · тикеты через MCP · DeepSeek</span>
</header>

<div class="ticketbar">
  <label>Тикет:</label>
  <select id="ticket" onchange="showTicket()">
    <option value="">— без тикета —</option>
  </select>
</div>
<div id="ticket-card"></div>

<div id="chat">
  <div class="messages" id="messages"></div>
  <div class="input-row">
    <textarea id="input" rows="3" placeholder="Вопрос пользователя… напр. «Почему не работает авторизация?»"></textarea>
    <button id="send-btn" onclick="send()">Спросить</button>
  </div>
</div>
<div class="hint">Выберите тикет — ассистент учтёт тариф и описание проблемы. Данные тикетов берутся через MCP, ответы — по документации продукта.</div>

<script>
marked.use({gfm:true,breaks:true});
const messagesEl=document.getElementById("messages");
const inputEl=document.getElementById("input");
const sendBtn=document.getElementById("send-btn");
const ticketSel=document.getElementById("ticket");
let tickets=[];
inputEl.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
function setLoading(on){inputEl.disabled=on;sendBtn.disabled=on;}
function addUser(t){const d=document.createElement("div");d.className="bubble user";d.textContent=t;messagesEl.appendChild(d);d.scrollIntoView({behavior:"smooth",block:"end"});}
function addError(t){const d=document.createElement("div");d.className="bubble error";d.textContent=t;messagesEl.appendChild(d);d.scrollIntoView({behavior:"smooth",block:"end"});}

function showTicket(){
  const id=ticketSel.value;const card=document.getElementById("ticket-card");
  const t=tickets.find(x=>x.id===id);
  if(!t){card.style.display="none";return;}
  card.style.display="block";
  card.innerHTML=`<b>${t.id}</b> · ${t.subject} · пользователь <b>${t.user}</b>, тариф <b>${t.plan}</b>`;
}

function addAgent(data){
  const d=document.createElement("div");d.className="bubble agent";
  const md=document.createElement("div");md.className="md";md.innerHTML=marked.parse(data.answer);d.appendChild(md);
  if(data.ticket&&!data.ticket.error){
    const u=data.ticket.user||{};
    const c=document.createElement("div");c.className="ctx";
    c.textContent=`🎫 учтён тикет ${data.ticket.id}: ${u.name||''} (тариф ${u.plan||'?'})`;d.appendChild(c);
  }
  if(data.sources&&data.sources.length){
    const s=document.createElement("div");s.className="sources";let html='<div class="st">📎 Источники (документация)</div>';
    const seen=new Set();data.sources.forEach(x=>{if(seen.has(x.source))return;seen.add(x.source);html+=`<span class="src">${x.source}</span>`;});
    s.innerHTML=html;d.appendChild(s);
  }
  messagesEl.appendChild(d);d.scrollIntoView({behavior:"smooth",block:"end"});
}

async function send(){
  const text=inputEl.value.trim();if(!text)return;
  inputEl.value="";setLoading(true);addUser(text);
  const th=document.createElement("div");th.className="bubble thinking";th.textContent="Смотрю тикет и документацию…";messagesEl.appendChild(th);th.scrollIntoView({behavior:"smooth",block:"end"});
  try{
    const res=await fetch("/ask",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text,ticket_id:ticketSel.value})});
    const data=await res.json();th.remove();
    if(!res.ok){addError(data.error||"Ошибка");}else{addAgent(data);}
  }catch(err){th.remove();addError("Сеть: "+err.message);}
  finally{setLoading(false);inputEl.focus();}
}

fetch("/tickets").then(r=>r.json()).then(list=>{
  tickets=list;
  list.forEach(t=>{const o=document.createElement("option");o.value=t.id;o.textContent=`${t.id} — ${t.subject} (${t.plan})`;ticketSel.appendChild(o);});
});
</script>
</body>
</html>
