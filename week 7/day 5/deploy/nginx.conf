# Reverse-proxy для веб-сервиса анализа GitHub-репозитория на VPS.
# Проксирует на сервис (порт 5011); TLS добавит certbot.

server {
    listen 80;
    server_name your-domain.example;      # заменить на свой домен

    client_max_body_size 1m;

    location / {
        proxy_pass         http://127.0.0.1:5011;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # анализ репо может идти долго (индексация/LLM) — увеличиваем таймаут
        proxy_read_timeout 300s;
    }
}

# TLS (после `certbot --nginx -d your-domain.example`):
#   Let's Encrypt автоматически добавит server{listen 443 ssl; ...} и HTTP→HTTPS редирект.
